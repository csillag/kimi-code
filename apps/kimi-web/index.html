<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Anchor all relative URLs (the `base: './'` build emits relative asset
         paths) to the origin root for direct serving, so a deep-link hard-refresh
         at e.g. /sessions/<id> still resolves ./assets/* to /assets/*. When this
         app is embedded under a reverse-proxy subpath, the embedder injects its
         own <base href="<subpath>/"> earlier in <head>; the FIRST <base href> in
         document order wins, so the embedder's prefix takes precedence in-frame. -->
    <base href="/" />
    <link rel="icon" href="favicon.ico" sizes="64x64" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d1117" media="(prefers-color-scheme: dark)" />
    <!-- Apply persisted display prefs BEFORE the bundle loads: without this,
         users can get a color-scheme/font flash before useKimiWebClient mirrors
         the data attributes. Mirrors applyColorSchemeToDocument. -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem('kimi-web.color-scheme');
          if (v === 'light' || v === 'dark' || v === 'system') {
            document.documentElement.dataset.colorScheme = v;
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <title>Kimi Code Web</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
